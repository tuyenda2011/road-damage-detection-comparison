[theme]
base               = "light"
primaryColor       = "#0f9f8f"
backgroundColor    = "#ffffff"
secondaryBackgroundColor = "#f7fafc"
textColor          = "#16303f"
font               = "sans serif"

[server]
headless           = true
enableCORS         = true
enableXsrfProtection = true

[browser]
gatherUsageStats   = false
